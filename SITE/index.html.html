let _binId   = localStorage.getItem("sc_binid")  || "";
let _cloudOK = false;
let _saveTimeout = null;
let _syncStatus  = "idle";

function setSyncStatus(s, msg){
  _syncStatus = s;
  const el = document.getElementById("sync_status");
  if(!el) return;
  const cfg = {
    idle:    {txt:"",                bg:"transparent", col:"#9ca3af"},
    saving:  {txt:"⏳ Sync…",        bg:"#fefce8",     col:"#d97706"},
    saved:   {txt:"☁️ Sauvé",        bg:"#f0fdf4",     col:"#16a34a"},
    error:   {txt:"❌ "+(msg||"Erreur"), bg:"#fef2f2", col:"#dc2626"},
    offline: {txt:"💾 Local uniquement", bg:"#f9fafb", col:"#9ca3af"},
    cloud:   {txt:"☁️ Cloud actif",   bg:"#eef2ff",    col:"#4f46e5"},
  }[s] || {};
  el.textContent = cfg.txt || "";
  el.style.cssText = `font-size:11px;font-weight:600;color:${cfg.col};background:${cfg.bg};border-radius:6px;padding:${cfg.txt?"3px 8px":"0"};transition:all .3s;cursor:${s==="offline"?"pointer":"default"}`;
  if(s==="offline") el.onclick = ()=>openModal("cloud");
  else el.onclick = null;
}

async function cloudSave(){
  if(!_apiKey || !_binId) return false;
  try {
    const r = await fetch(`${JBIN_URL}/${_binId}`, {
      method:"PUT",
      headers:{"Content-Type":"application/json","X-Master-Key":_apiKey},
      body: JSON.stringify({leads, fups, objectifs, savedAt: new Date().toISOString()})
    });
    return r.ok;
  } catch { return false; }
}

async function cloudLoad(){
  if(!_apiKey || !_binId) return false;
  try {
    const r = await fetch(`${JBIN_URL}/${_binId}/latest`, {
      headers:{"X-Master-Key":_apiKey}
    });
    if(!r.ok) return false;
    const d = await r.json();
    const rec = d.record;
    if(rec && Array.isArray(rec.leads) && rec.leads.length > 0){
      leads = rec.leads; fups = rec.fups||[]; objectifs = rec.objectifs||{};
      localStorage.setItem("sc_leads", JSON.stringify(leads));
      localStorage.setItem("sc_fups",  JSON.stringify(fups));
      localStorage.setItem("sc_obj",   JSON.stringify(objectifs));
      return true;
    }
    return false;
  } catch { return false; }
}

async function initCloud(){
  if(!_apiKey || !_binId){ setSyncStatus("offline"); return; }
  setSyncStatus("saving");
  const ok = await cloudLoad();
  _cloudOK = ok;
  setSyncStatus(ok ? "cloud" : "error", ok ? "" : "Clé invalide");
  if(ok) { setTimeout(()=>setSyncStatus("idle"),2000); render(); }
}

function save(){
  localStorage.setItem("sc_leads", JSON.stringify(leads));
  localStorage.setItem("sc_fups",  JSON.stringify(fups));
  localStorage.setItem("sc_obj",   JSON.stringify(objectifs));
  if(_apiKey && _binId){
    setSyncStatus("saving");
    clearTimeout(_saveTimeout);
    _saveTimeout = setTimeout(async()=>{
      const ok = await cloudSave();
      setSyncStatus(ok ? "saved" : "error", ok ? "" : "Sync échouée");
      if(ok) setTimeout(()=>setSyncStatus("idle"), 2500);
    }, 800);
  } else {
    setSyncStatus("offline");
  }
}

function load(){
  const l=localStorage.getItem("sc_leads"), f=localStorage.getItem("sc_fups"), o=localStorage.getItem("sc_obj");
  leads = l ? JSON.parse(l) : SEEDS;
  fups  = f ? JSON.parse(f) : [];
  objectifs = o ? JSON.parse(o) : {};
  const existingIds = new Set(leads.map(x=>x.id));
  const toAdd = [...TEDDY_SEEDS,...BENOIT_SEEDS,...PISCINE_SEEDS].filter(t=>!existingIds.has(t.id));
  if(toAdd.length){
    toAdd.forEach(l=>{ if(l.commentInit){ fups.push({id:gid(),leadId:l.id,type:"call",comment:l.commentInit,temperature:l.temperature,expectedCloseDate:"",nextFollowupDate:"",outcome:"pending",lostReason:"",author:"Secrétaire",date:l.createdAt}); }});
    leads=[...leads,...toAdd]; save();
  }
}

window.cloudConnect = async function(){
  const key = document.getElementById("cloud_key")?.value?.trim();
  if(!key){ alert("Collez votre Master Key"); return; }
  const msg = document.getElementById("cloud_msg");
  msg.style.display="block"; msg.style.background="#fefce8"; msg.style.color="#d97706"; msg.textContent="⏳ Connexion en cours…";

  // Créer un nouveau bin avec les données actuelles
  try {
    const r = await fetch(JBIN_URL, {
      method:"POST",
      headers:{"Content-Type":"application/json","X-Master-Key":key,"X-Bin-Name":"SuiviCommercial","X-Bin-Private":"true"},
      body: JSON.stringify({leads, fups, objectifs, createdAt: new Date().toISOString()})
    });
    if(!r.ok){ msg.style.background="#fef2f2"; msg.style.color="#dc2626"; msg.textContent="❌ Clé invalide — vérifiez votre Master Key sur jsonbin.io"; return; }
    const d = await r.json();
    _apiKey = key; _binId = d.metadata?.id || d.record?._id || "";
    localStorage.setItem("sc_apikey", _apiKey);
    localStorage.setItem("sc_binid",  _binId);
    _cloudOK = true;
    msg.style.background="#f0fdf4"; msg.style.color="#16a34a";
    msg.textContent=`✅ Cloud activé ! ID: ${_binId} — Partagez ce fichier HTML avec vos collègues, ils verront les mêmes données.`;
    setSyncStatus("cloud");
    setTimeout(()=>{ closeModal(); setSyncStatus("idle"); }, 3000);
  } catch(e) {
    msg.style.background="#fef2f2"; msg.style.color="#dc2626";
    msg.textContent="❌ Erreur réseau : "+e.message;
  }
};

window.cloudDisconnect = function(){
  if(!confirm("Déconnecter le cloud ? Vos données locales restent intactes.")) return;
  _apiKey=""; _binId=""; _cloudOK=false;
  localStorage.removeItem("sc_apikey"); localStorage.removeItem("sc_binid");
  setSyncStatus("offline"); closeModal();
};

const boss=()=>user==="Manager"||SECS.includes(user);
const vSps=()=>boss()?SPS:[user];
const aL=()=>leads.filter(l=>l.status==="active");
const myA=()=>boss()?aL():aL().filter(l=>l.salesperson===user);
const allU=()=>["Manager",...SECS.filter(s=>!SPS.includes(s)),...SPS];

function fc(sp){
  const src=sp?aL().filter(l=>l.salesperson===sp):aL();
  return src.reduce((a,l)=>({hot:a.hot+(l.temperature==="hot"?l.amount:0),warm:a.warm+(l.temperature==="warm"?l.amount:0),cold:a.cold+(l.temperature==="cold"?l.amount:0),total:a.total+l.amount,count:a.count+1}),{hot:0,warm:0,cold:0,total:0,count:0});
}

function buildFC(){
  const m={};
  myA().filter(l=>l.expectedCloseDate).forEach(l=>{
    const k=l.expectedCloseDate;
    if(!m[k])m[k]={hot:0,warm:0,cold:0,total:0,leads:[]};
    m[k][l.temperature]+=l.amount;m[k].total+=l.amount;m[k].leads.push(l);
  });
  return Object.entries(m).sort((a,b)=>a[0].localeCompare(b[0])).map(([k,v])=>({k,...v}));
}

function go(v,l=null){view=v;lid=l;render();}
function openModal(m,d={}){modal=m;modalData=d;render();}
function closeModal(){modal=null;render();}

function el(tag,cls,attrs,ch){
  const e=document.createElement(tag);
  if(cls)e.className=cls;
  if(attrs)Object.assign(e,attrs);
  if(typeof ch==="string")e.innerHTML=ch;
  else if(Array.isArray(ch))ch.forEach(c=>{if(c!=null)e.appendChild(typeof c==="string"?document.createTextNode(c):c);});
  return e;
}
function div(cls,ch,style){const e=el("div",cls,style?{style}:null,ch);return e;}
function badge(t){return div("badge "+t,[TEMP[t].e+" "+TEMP[t].l]);}
function statusBadge(l){
  if(l.status==="active")return badge(l.temperature);
  if(l.status==="won")return div("badge won",["✅ Gagné"]);
  return div("badge lost",["❌ Perdu"]);
}
function tag(cls,txt,style){const e=div(cls,[txt]);if(style)e.style.cssText=style;return e;}

  html+=`<div class="card"><div class="card-title">⏰ Relances à venir (7 jours)</div>`;
  if(!list.length){html+=`<div class="empty">Aucune relance prévue dans les 7 prochains jours 🎉</div>`;}
  else list.forEach(l=>{
    const ov=isOD(l.nextFollowupDate);
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:8px;cursor:pointer;margin-bottom:5px;background:${ov?"#fff5f5":"#f9fafb"};border:1px solid ${ov?"#fca5a5":"#e8eaed"}" onclick="go('lead','${l.id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:16px">${TEMP[l.temperature].e}</span>
        <div><div style="font-weight:600">${fmtN(l)}</div><div style="font-size:11px;color:#9ca3af">${l.salesperson}${l.expectedCloseDate?" · Signature : "+fmtM(l.expectedCloseDate):""}</div></div>
      </div>
      <div style="text-align:right"><div style="font-weight:700;color:#4f46e5">${fmtE(l.amount)}</div><div style="font-size:11px;color:${ov?"#dc2626":"#6b7280"};font-weight:${ov?600:400}">${ov?"⚠ En retard":fmtD(l.nextFollowupDate)}</div></div>
    </div>`;
  });
  html+=`</div>`;
  return html;
}

// ─── PIPELINE ────────────────────────────────────────────────
function pipelineHTML(){
  const filtered=leads.filter(l=>{
    if(filt.status!=="all"&&l.status!==filt.status)return false;
    if(filt.sp!=="Tous"&&l.salesperson!==filt.sp)return false;
    if(filt.store!=="Tous"&&l.store!==filt.store)return false;
    if(filt.q&&!l.clientName.toLowerCase().includes(filt.q.toLowerCase()))return false;
    if(!boss()&&l.salesperson!==user)return false;
    return true;
  });

  // Appliquer le tri
  const TEMP_ORDER={hot:0,warm:1,cold:2};
  const sortFns={
    clientName:(a,b)=>a.clientName.localeCompare(b.clientName),
    amount:(a,b)=>a.amount-b.amount,
    salesperson:(a,b)=>a.salesperson.localeCompare(b.salesperson),
    store:(a,b)=>(a.store||"").localeCompare(b.store||""),
    createdAt:(a,b)=>new Date(a.createdAt)-new Date(b.createdAt),
    expectedCloseDate:(a,b)=>{if(!a.expectedCloseDate)return 1;if(!b.expectedCloseDate)return-1;return a.expectedCloseDate.localeCompare(b.expectedCloseDate);},
    nextFollowupDate:(a,b)=>{if(!a.nextFollowupDate)return 1;if(!b.nextFollowupDate)return-1;return new Date(a.nextFollowupDate)-new Date(b.nextFollowupDate);},
    temperature:(a,b)=>(TEMP_ORDER[a.temperature]??9)-(TEMP_ORDER[b.temperature]??9),
  };
  const fn=sortFns[sort.col]||sortFns.createdAt;
  filtered.sort((a,b)=>sort.dir==="asc"?fn(a,b):-fn(a,b));

  const thStyle="cursor:pointer;user-select:none;white-space:nowrap;";
  const arrow=col=>{
    if(sort.col!==col)return`<span style="color:#d1d5db;margin-left:3px">⇅</span>`;
    // Pour température : asc = 🔥→❄️, desc = ❄️→🔥
    if(col==="temperature")return sort.dir==="asc"?`<span style="margin-left:3px">🔥→❄️</span>`:`<span style="margin-left:3px">❄️→🔥</span>`;
    return sort.dir==="asc"?`<span style="color:#4f46e5;margin-left:3px">↑</span>`:`<span style="color:#4f46e5;margin-left:3px">↓</span>`;
  };
  const th=(col,label)=>`<th style="${thStyle}color:${sort.col===col?"#4f46e5":"#9ca3af"}" onclick="toggleSort('${col}')">${label}${arrow(col)}</th>`;

  let html=`<div style="display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;align-items:center">
    <span style="font-size:12px;color:#6b7280;font-weight:500">🏪</span>
    ${["Tous",...STORES].map(st=>`<button onclick="filt.store='${st==="Tous"?"Tous":st}';render()" style="padding:6px 14px;border-radius:20px;border:${filt.store===(st==="Tous"?"Tous":st)?"none":"1px solid #d1d5db"};background:${filt.store===(st==="Tous"?"Tous":st)?"#4f46e5":"#fff"};color:${filt.store===(st==="Tous"?"Tous":st)?"#fff":"#374151"};font-size:12px;font-weight:${filt.store===(st==="Tous"?"Tous":st)?600:400};cursor:pointer">${st==="Tous"?"Tous":st}</button>`).join("")}
  </div>
  <div class="flt-bar">
    <input type="text" placeholder="🔍 Rechercher…" value="${filt.q||""}" oninput="filt.q=this.value;render()" style="max-width:180px">`;
  if(boss()){
    html+=`<select onchange="filt.sp=this.value;render()"><option value="Tous">Tous les vendeurs</option>${SPS.map(sp=>`<option${sp===filt.sp?" selected":""}>${sp}</option>`).join("")}</select>`;
  }
  html+=`<select onchange="filt.status=this.value;render()"><option value="active"${filt.status==="active"?" selected":""}>Actifs</option><option value="won"${filt.status==="won"?" selected":""}>Gagnés</option><option value="lost"${filt.status==="lost"?" selected":""}>Perdus</option><option value="all"${filt.status==="all"?" selected":""}>Tous</option></select>`;
  html+=`<span style="margin-left:auto;font-size:11px;color:#9ca3af">${filtered.length} dossier${filtered.length!==1?"s":""} · <span style="color:#6b7280">Cliquez sur une colonne pour trier</span></span></div>`;

  html+=`<div class="card"><table><thead><tr>
    ${th("clientName","Client")}
    ${th("store","Magasin")}
    ${th("salesperson","Vendeur")}
    ${th("amount","Devis")}
    ${th("temperature","Statut / Temp.")}
    ${th("expectedCloseDate","Mois signature")}
    ${th("nextFollowupDate","Relance")}
    ${th("createdAt","Créé le")}
    <th style="color:#9ca3af">Âge</th>
    <th style="color:#9ca3af">Historique</th>
  </tr></thead><tbody>`;
  if(!filtered.length){html+=`<tr><td colspan="10" class="empty">Aucun dossier trouvé</td></tr>`;}
  filtered.forEach(l=>{
    const ov=l.status==="active"&&isOD(l.nextFollowupDate);
    const sb=l.status==="active"?`<span class="badge ${l.temperature}">${TEMP[l.temperature].e} ${TEMP[l.temperature].l}</span>`:l.status==="won"?`<span class="badge won">✅ Gagné</span>`:`<span class="badge lost">❌ Perdu</span>`;
    const lFups=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
    const lastFup=lFups[0];
    const ct=lastFup?CTYPES.find(c=>c[0]===lastFup.type):null;
    // Âge du dossier
    const ageJ=Math.floor((new Date()-new Date(l.createdAt))/86400000);
    const lastActJ=lastFup?Math.floor((new Date()-new Date(lastFup.date))/86400000):ageJ;
    const ageColor=lastActJ>30?"#dc2626":lastActJ>15?"#d97706":"#16a34a";
    const ageTxt=lastActJ>30?`🔴 ${lastActJ}j`:lastActJ>15?`🟡 ${lastActJ}j`:`🟢 ${lastActJ}j`;
    const relanceur=l.relanceur||l.salesperson;
    const delegue=relanceur!==l.salesperson&&SECS.includes(relanceur);
    html+=`<tr class="tr-click" onclick="go('lead','${l.id}')" style="${lastActJ>30&&l.status==="active"?"background:#fff9f9":""}">
      <td style="font-weight:600">${fmtN(l)}${l.ptype?`<div style="font-size:10px;color:#9ca3af">${l.ptype}</div>`:""}</td>
      <td><span class="store-tag">${l.store||"—"}</span></td>
      <td>
        <div style="font-weight:500;color:#374151">${l.salesperson}</div>
        ${delegue?`<div style="font-size:10px;margin-top:2px;color:#7c3aed;font-weight:600">📋 → ${relanceur}</div>`:""}
      </td>
      <td style="font-weight:700;color:#4f46e5">${fmtE(l.amount)}</td>
      <td>${sb}</td>
      <td style="color:${l.expectedCloseDate?"#4f46e5":"#d1d5db"};font-weight:${l.expectedCloseDate?600:400}">${l.expectedCloseDate?fmtM(l.expectedCloseDate):"—"}</td>
      <td style="color:${ov?"#dc2626":"#6b7280"};font-weight:${ov?600:400}">${ov?"⚠ ":""}${fmtD(l.nextFollowupDate)}</td>
      <td style="color:#9ca3af;font-size:11px">${fmtD(l.createdAt)}</td>
      <td style="font-size:11px;font-weight:600;color:${ageColor};white-space:nowrap" title="Dernière activité il y a ${lastActJ} jours">${l.status==="active"?ageTxt:"—"}</td>
      <td onclick="event.stopPropagation()">
        ${lFups.length===0
          ? `<span style="color:#d1d5db;font-size:11px">Aucune</span>`
          : `<button onclick="openModal('hist',{leadId:'${l.id}'})" style="background:#f0f9ff;border:1px solid #bae6fd;color:#0369a1;border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;font-weight:600;white-space:nowrap">
              📋 ${lFups.length} relance${lFups.length>1?"s":""}
              ${ct?`<span style="margin-left:4px">${ct[1]}</span>`:""}
            </button>`
        }
      </td>
    </tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

// ─── LEAD DETAIL ─────────────────────────────────────────────
function leadHTML(){
  const l=leads.find(x=>x.id===lid);
  if(!l)return"";
  const lFups=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const sb=l.status==="active"?`<span class="badge ${l.temperature}">${TEMP[l.temperature].e} ${TEMP[l.temperature].l}</span>`:l.status==="won"?`<span class="badge won">✅ Gagné</span>${l.signedDirect?'<span style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:20px;padding:2px 8px;font-size:11px;font-weight:600;margin-left:6px">⚡ Vente directe</span>':""}`:l.status==="lost"?`<span class="badge lost">❌ Perdu${l.lostReason?" — "+l.lostReason:""}</span>`:"";

  let html=`<button class="btn-g" onclick="go('pipeline')" style="margin-bottom:14px">← Retour</button>
  <div class="det-grid">
    <div class="left-panel">
      <div class="client-card">
        <div style="font-weight:700;font-size:17px;margin-bottom:2px">${fmtN(l)}</div>
        <div style="font-size:11px;color:#9ca3af;margin-bottom:8px">Vendeur : ${l.salesperson}</div>
        ${l.store?`<div style="margin-bottom:10px"><span class="store-tag">🏪 ${l.store}</span></div>`:""}
        <div class="client-amount">${fmtE(l.amount)}</div>
        <div style="margin-bottom:14px">${sb}</div>
        <div class="info-box">
          <div class="info-row"><span style="color:#6b7280">📅 Créé le</span><span style="font-weight:600">${fmtD(l.createdAt)}</span></div>
          <div class="info-row"><span style="color:#6b7280">🔔 Prochaine relance</span><span style="font-weight:600;color:${isOD(l.nextFollowupDate)?"#dc2626":"#374151"}">${fmtD(l.nextFollowupDate)}</span></div>
          <div class="info-row"><span style="color:#6b7280">🖊 Mois de signature</span><span style="font-weight:600;color:${l.expectedCloseDate?"#4f46e5":"#9ca3af"}">${l.expectedCloseDate?fmtM(l.expectedCloseDate):"Non renseigné"}</span></div>
          <div class="info-row"><span style="color:#6b7280">📋 Relances</span><span style="font-weight:600">${lFups.length}</span></div>
          <div class="info-row"><span style="color:#6b7280">👤 Responsable relance</span>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <select style="font-size:12px;padding:3px 6px;border-radius:6px;border:1px solid ${(l.relanceur&&l.relanceur!==l.salesperson&&SECS.includes(l.relanceur))?"#7c3aed":"#d1d5db"};cursor:pointer;background:${(l.relanceur&&l.relanceur!==l.salesperson&&SECS.includes(l.relanceur))?"#f5f3ff":"#fff"};color:${(l.relanceur&&l.relanceur!==l.salesperson&&SECS.includes(l.relanceur))?"#7c3aed":"#374151"};font-weight:600" onchange="changeRelanceur('${l.id}',this.value)">
                ${[...SPS,...secsForStore(l.store)].filter((v,i,a)=>a.indexOf(v)===i).map(r=>`<option value="${r}"${(l.relanceur||l.salesperson)===r?" selected":""}>${r}</option>`).join("")}
              </select>
              ${(l.relanceur&&l.relanceur!==l.salesperson)?
                `<span style="font-size:10px;color:#7c3aed;font-weight:600">📋 Délégué par ${l.salesperson}</span>`
                :`<span style="font-size:10px;color:#9ca3af">Vendeur propriétaire : ${l.salesperson}</span>`}
            </div>
          </div>
        </div>
      </div>`;
  if(l.status==="active"){
    html+=`<button class="btn-p" style="width:100%;padding:11px" onclick="openModal('fup',{leadId:'${l.id}'})">+ Ajouter une relance</button>`;
  }
  html+=`<button class="btn-g" style="width:100%;padding:8px;color:#dc2626;border-color:#fca5a5;font-size:11px" onclick="delLead('${l.id}')">🗑 Supprimer ce dossier</button>
    </div>
    <div>
      <div style="font-weight:600;font-size:14px;margin-bottom:12px">📋 Historique des relances (${lFups.length})</div>`;
  if(!lFups.length){
    html+=`<div class="card empty">Aucune relance enregistrée.<br>Cliquez sur « Ajouter une relance ».</div>`;
  } else {
    // lFups est trié du plus récent au plus ancien
    // Pour comparer, on a besoin du suivant (= plus ancien)
    lFups.forEach((fu,i)=>{
      const bc=fu.outcome==="won"?"#16a34a":fu.outcome==="lost"?"#9ca3af":"#4f46e5";
      const ct=CTYPES.find(c=>c[0]===fu.type)||["","?","?"];
      // Détection changement de température
      const prevFu=lFups[i+1]; // relance précédente (plus ancienne)
      const tempChanged=fu.temperature&&prevFu&&prevFu.temperature&&fu.temperature!==prevFu.temperature;
      const tempArrow=tempChanged?`<div style="display:inline-flex;align-items:center;gap:5px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:8px">
        <span>${TEMP[prevFu.temperature].e}</span>
        <span style="color:#9ca3af">→</span>
        <span>${TEMP[fu.temperature].e}</span>
        <span style="color:${TEMP[fu.temperature].color};margin-left:2px">Passé ${TEMP[prevFu.temperature].l} → ${TEMP[fu.temperature].l}</span>
      </div>`:"";
      let tags="";
      if(fu.temperature&&fu.outcome==="pending") tags+=`<span class="badge ${fu.temperature}">${TEMP[fu.temperature].e} ${TEMP[fu.temperature].l}</span>`;
      if(fu.expectedCloseDate) tags+=`<span class="badge" style="background:#eef2ff;color:#4f46e5;border:1px solid #c7d2fe">🖊 ${fmtM(fu.expectedCloseDate)}</span>`;
      if(fu.nextFollowupDate&&fu.outcome==="pending") tags+=`<span class="badge" style="background:#f0f9ff;color:#0284c7;border:1px solid #bae6fd">🔔 ${fmtD(fu.nextFollowupDate)}</span>`;
      if(fu.outcome==="won") tags+=`<span class="badge won">✅ Gagné</span>`;
      if(fu.outcome==="lost") tags+=`<span class="badge lost">❌ ${fu.lostReason||"Perdu"}</span>`;
      html+=`<div class="fu-card" style="border-left-color:${bc}">
        <div class="fu-head">
          <div style="display:flex;gap:7px;align-items:center;font-weight:600;font-size:12px">${ct[1]} ${ct[2]} <span class="tc-info">par ${fu.author}</span></div>
          <span style="font-size:10px;color:#9ca3af">${fmtDT(fu.date)}</span>
        </div>
        ${tempArrow}
        ${fu.comment?`<div style="font-size:12px;color:#374151;line-height:1.55;margin-bottom:9px;background:#f9fafb;border-radius:6px;padding:8px 10px">${fu.comment}</div>`:""}
        <div class="fu-tags">${tags}</div>
      </div>`;
    });
  }
  html+=`</div></div>`;
  return html;
}

// ─── STATISTIQUES ─────────────────────────────────────────────
function statsHTML(){
  // Filtre des dossiers selon statsFilt
  const inPeriod=l=>{
    if(statsFilt.sp!=="Tous"&&l.salesperson!==statsFilt.sp)return false;
    if(statsFilt.store!=="Tous"&&l.store!==statsFilt.store)return false;
    if(!boss()&&l.salesperson!==user)return false;
    const d=l.createdAt?l.createdAt.slice(0,7):"";
    if(statsFilt.from&&d<statsFilt.from)return false;
    if(statsFilt.to&&d>statsFilt.to)return false;
    return true;
  };
  const sLeads=leads.filter(inPeriod);
  const won=sLeads.filter(l=>l.status==="won"), lost=sLeads.filter(l=>l.status==="lost"), active=sLeads.filter(l=>l.status==="active");
  const caWon=won.reduce((s,l)=>s+l.amount,0);
  const caMargeWon=won.reduce((s,l)=>s+(l.marge||0),0);
  const txMarge=caWon>0&&caMargeWon>0?Math.round(caMargeWon/caWon*100):null;
  const conv=won.length+lost.length===0?null:Math.round(won.length/(won.length+lost.length)*100);
  const bigD=active.length?active.reduce((m,l)=>l.amount>m.amount?l:m,active[0]):null;
  const isPeriod=statsFilt.from||statsFilt.to||statsFilt.sp!=="Tous"||statsFilt.store!=="Tous";

  let html="";

  // ── BARRE DE FILTRES ──
  html+=`<div class="card" style="margin-bottom:14px;padding:14px 18px">
    <div style="font-weight:600;font-size:13px;margin-bottom:4px">🔎 Filtrer les statistiques</div>
    <div style="font-size:11px;color:#9ca3af;margin-bottom:12px">⚠ Les filtres de période sont basés sur la <b>date de création du dossier</b> (date à laquelle le client a été ajouté).</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div>
        <label class="lbl">Dossiers créés à partir du</label>
        <input type="month" value="${statsFilt.from}" onchange="statsFilt.from=this.value;render()" style="width:160px">
      </div>
      <div>
        <label class="lbl">Jusqu'au mois de</label>
        <input type="month" value="${statsFilt.to}" onchange="statsFilt.to=this.value;render()" style="width:160px">
      </div>
      ${boss()?`<div>
        <label class="lbl">Vendeur</label>
        <select onchange="statsFilt.sp=this.value;render()" style="width:140px">
          <option value="Tous"${statsFilt.sp==="Tous"?" selected":""}>Tous les vendeurs</option>
          ${SPS.map(s=>`<option value="${s}"${statsFilt.sp===s?" selected":""}>${s}</option>`).join("")}
        </select>
      </div>
      <div>
        <label class="lbl">Magasin</label>
        <select onchange="statsFilt.store=this.value;render()" style="width:150px">
          <option value="Tous"${statsFilt.store==="Tous"?" selected":""}>Tous les magasins</option>
          ${STORES.map(s=>`<option value="${s}"${statsFilt.store===s?" selected":""}>${s}</option>`).join("")}
        </select>
      </div>`:""}
      ${isPeriod?`<button onclick="statsFilt={sp:'Tous',store:'Tous',from:'',to:''};render()" style="background:#f3f4f6;border:1px solid #d1d5db;border-radius:7px;padding:7px 12px;font-size:12px;cursor:pointer;color:#374151;align-self:flex-end">✕ Réinitialiser</button>`:""}
    </div>
    ${isPeriod?`<div style="margin-top:10px;padding:6px 10px;background:#eef2ff;border-radius:6px;font-size:11px;color:#4f46e5;font-weight:500">
      📊 Dossiers créés${statsFilt.from?" à partir de "+fmtM(statsFilt.from):""}${statsFilt.to?" jusqu'à "+fmtM(statsFilt.to):""}${statsFilt.sp!=="Tous"?" · "+statsFilt.sp:""}${statsFilt.store!=="Tous"?" · "+statsFilt.store:""} — ${sLeads.length} dossier${sLeads.length!==1?"s":""}
    </div>`:""}
  </div>`;

  // ── KPIs ──
  const caActive=active.reduce((s,l)=>s+l.amount,0);
  html+=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:14px">`;
  [["💼 Portefeuille en cours",fmtE(caActive),"#4f46e5",active.length+" devis actifs"],
   ["✅ CA gagné",fmtE(caWon),"#16a34a",won.length+" signé"+(won.length!==1?"s":"")],
   ["📊 Taux conversion",conv!==null?conv+"%":"—","#0891b2",won.length+"/"+(won.length+lost.length)+" closés"],
   ["❌ Perdus",lost.length,"#dc2626",fmtE(lost.reduce((s,l)=>s+l.amount,0))+" perdus"],
   ["💹 Marge",caMargeWon?fmtE(caMargeWon):"—","#059669",txMarge!==null?txMarge+"% du CA":"Non renseignée"]
  ].forEach(([l,v,c,s])=>{
    html+=`<div class="kpi" style="border-left:4px solid ${c}"><div class="lbl">${l}</div><div class="val" style="color:${c}">${v}</div><div class="sub">${s}</div></div>`;
  });
  html+=`</div>`;

  // ── COMPARAISON MOIS PAR MOIS ──
  const allMonths={};
  sLeads.forEach(l=>{
    const m=l.createdAt?l.createdAt.slice(0,7):"?";
    if(!allMonths[m])allMonths[m]={won:[],lost:[],active:[],total:[]};
    allMonths[m][l.status].push(l);
    allMonths[m].total.push(l);
  });
  const monthKeys=Object.keys(allMonths).sort();
  if(monthKeys.length>1||isPeriod){
    html+=`<div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <div><div class="card-title">📆 Évolution mois par mois</div><div style="font-size:11px;color:#9ca3af">Basé sur la <b>date de création</b> des dossiers — CA gagné, perdus, conversion</div></div>
    </div>
    <div style="overflow-x:auto"><table><thead><tr>

window.saveVente=function(){
  const l=leads.find(x=>x.id===modalData.selected);
  if(!l)return;
  const amt=parseFloat(document.getElementById("v_amt")?.value||l.amount);
  const date=document.getElementById("v_date")?.value||new Date().toISOString().slice(0,10);
  const marge=parseFloat(document.getElementById("v_marge")?.value||0);
  const margepct=parseFloat(document.getElementById("v_margepct")?.value||0);
  const comment=document.getElementById("v_comment")?.value?.trim()||"";
  const margeInfo=marge?` — Marge : ${fmtE(marge)}`:(margepct?` — Marge : ${margepct}%`:"");
  leads=leads.map(x=>x.id===l.id?{...x,status:"won",amount:amt,marge:marge||Math.round(amt*margepct/100)||0,expectedCloseDate:date.slice(0,7)}:x);
  fups=[{id:gid(),leadId:l.id,type:"store",comment:`✅ Vente confirmée${margeInfo}${comment?" — "+comment:""}`,temperature:"hot",expectedCloseDate:date.slice(0,7),nextFollowupDate:"",outcome:"won",lostReason:"",author:user,date:new Date().toISOString()},...fups];
  save();closeModal();
};

window.saveVenteDirect=function(){
  const name=document.getElementById("vd_name")?.value?.trim();
  const amt=parseFloat(document.getElementById("vd_amt")?.value||0);
  const sp=document.getElementById("vd_sp")?.value;
  const store=document.getElementById("vd_store")?.value;
  const date=document.getElementById("vd_date")?.value||new Date().toISOString().slice(0,10);
  const marge=parseFloat(document.getElementById("vd_marge")?.value||0);
  const margepct=parseFloat(document.getElementById("vd_margepct")?.value||0);
  const margeFinale=marge||(margepct&&amt?Math.round(amt*margepct/100):0);
  const ptype=document.getElementById("vd_ptype")?.value||"";
  if(!name||!amt||!store){
    [["vd_name",!name],["vd_amt",!amt],["vd_store",!store]].forEach(([id,err])=>{
      if(!err)return;
      const el=document.getElementById(id);if(!el)return;
      el.style.outline="2.5px solid #dc2626";
      let n=0;const t=setInterval(()=>{el.style.outline=n%2===0?"2.5px solid #dc2626":"2.5px solid transparent";n++;if(n>=6){clearInterval(t);el.style.outline="2.5px solid #dc2626";}},180);
    });return;
  }
  const newId=gid();
  leads=[{id:newId,clientName:name,prenom:"",amount:amt,temperature:"hot",salesperson:sp,store,relanceur:sp,ptype,marge:margeFinale,expectedCloseDate:date.slice(0,7),nextFollowupDate:"",createdAt:new Date().toISOString(),status:"won",signedDirect:true,lostReason:""},...leads];
  fups=[{id:gid(),leadId:newId,type:"store",comment:`✅ Vente directe${margeFinale?" — Marge : "+fmtE(margeFinale)+(margepct?" ("+margepct+"%)":""):""}`,temperature:"hot",expectedCloseDate:date.slice(0,7),nextFollowupDate:"",outcome:"won",lostReason:"",author:user,date:new Date().toISOString()},...fups];
  save();closeModal();
};

// ─── MODAL HISTORIQUE ─────────────────────────────────────────
function modalHistHTML(){
  const l=leads.find(x=>x.id===modalData.leadId);
  if(!l)return'<div class="modal"><p>Dossier introuvable</p></div>';
  const lFups=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  let html=`<div class="modal" onclick="event.stopPropagation()" style="width:560px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
      <div>
        <div style="font-weight:700;font-size:16px">${fmtN(l)}</div>
        <div style="font-size:11px;color:#9ca3af;margin-top:2px">${l.salesperson} · ${l.store||""} · ${fmtE(l.amount)}</div>
      </div>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#9ca3af;line-height:1">×</button>
    </div>`;

  if(!lFups.length){
    html+=`<div class="empty" style="padding:30px">Aucune relance enregistrée.</div>`;
  } else {
    lFups.forEach((fu,i)=>{
      const ct=CTYPES.find(c=>c[0]===fu.type)||["","?","?"];
      const bc=fu.outcome==="won"?"#16a34a":fu.outcome==="lost"?"#9ca3af":"#4f46e5";
      const isLast=i===0;
      const prevFu=lFups[i+1];
      const tempChanged=fu.temperature&&prevFu&&prevFu.temperature&&fu.temperature!==prevFu.temperature;
      const tempArrow=tempChanged?`<div style="display:inline-flex;align-items:center;gap:5px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600;margin-bottom:8px">
        <span>${TEMP[prevFu.temperature].e}</span>
        <span style="color:#9ca3af">→</span>
        <span>${TEMP[fu.temperature].e}</span>
        <span style="color:${TEMP[fu.temperature].color};margin-left:2px">Passé ${TEMP[prevFu.temperature].l} → ${TEMP[fu.temperature].l}</span>
      </div>`:"";
      html+=`<div style="border-left:3px solid ${bc};padding:12px 14px;margin-bottom:8px;background:${isLast?"#f8faff":"#fafafa"};border-radius:0 8px 8px 0;${isLast?"border:1px solid #e0e7ff;border-left:3px solid "+bc:""}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
          <div style="display:flex;gap:8px;align-items:center">
            ${isLast?`<span style="background:#4f46e5;color:#fff;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px">DERNIÈRE</span>`:""}
            <span style="font-size:14px">${ct[1]}</span>
            <span style="font-weight:600;font-size:12px">${ct[2]}</span>
            <span style="font-size:11px;color:#9ca3af">par ${fu.author}</span>
          </div>
          <span style="font-size:10px;color:#9ca3af;white-space:nowrap">${fmtDT(fu.date)}</span>
        </div>
        ${tempArrow}
        ${fu.comment?`<div style="font-size:12px;color:#374151;line-height:1.55;background:#fff;border-radius:6px;padding:8px 10px;margin-bottom:8px;border:1px solid #e8eaed">${fu.comment}</div>`:"<div style='font-size:11px;color:#d1d5db;margin-bottom:6px;font-style:italic'>Pas de commentaire</div>"}
        <div style="display:flex;gap:5px;flex-wrap:wrap">
          ${fu.temperature&&fu.outcome==="pending"?`<span class="badge ${fu.temperature}">${TEMP[fu.temperature].e} ${TEMP[fu.temperature].l}</span>`:""}
          ${fu.expectedCloseDate?`<span class="badge" style="background:#eef2ff;color:#4f46e5;border:1px solid #c7d2fe">🖊 ${fmtM(fu.expectedCloseDate)}</span>`:""}
          ${fu.nextFollowupDate&&fu.outcome==="pending"?`<span class="badge" style="background:#f0f9ff;color:#0284c7;border:1px solid #bae6fd">🔔 ${fmtD(fu.nextFollowupDate)}</span>`:""}
          ${fu.outcome==="won"?`<span class="badge won">✅ Gagné</span>`:""}
          ${fu.outcome==="lost"?`<span class="badge lost">❌ ${fu.lostReason||"Perdu"}</span>`:""}
        </div>
      </div>`;
    });
  }

  html+=`<div style="display:flex;gap:8px;margin-top:16px;justify-content:space-between;align-items:center">
    <span style="font-size:11px;color:#9ca3af">${lFups.length} relance${lFups.length>1?"s":""} au total</span>
    <div style="display:flex;gap:8px">
      ${l.status==="active"?`<button onclick="closeModal();setTimeout(()=>openModal('fup',{leadId:'${l.id}'}),50)" style="background:#4f46e5;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer">+ Ajouter une relance</button>`:""}
      <button onclick="closeModal();go('lead','${l.id}')" style="background:#f3f4f6;border:1px solid #d1d5db;color:#374151;border-radius:7px;padding:8px 14px;font-size:12px;cursor:pointer">Ouvrir le dossier →</button>
    </div>
  </div>
  </div>`;
  return html;
}

window.checkDuplicate=function(val){
  const alert=document.getElementById("m_dup_alert");
  if(!alert)return;
  const q=(val||"").trim().toLowerCase();
  if(q.length<3){alert.style.display="none";return;}
  // Cherche les dossiers existants dont le nom ressemble
  const matches=leads.filter(l=>{
    const n=(fmtN(l)||"").toLowerCase();
    return n.includes(q)||q.includes(n.slice(0,Math.min(n.length,q.length)));
  }).slice(0,5);
  if(!matches.length){alert.style.display="none";return;}
  alert.style.display="block";
  alert.innerHTML=`⚠ <b>${matches.length} dossier${matches.length>1?"s":""} similaire${matches.length>1?"s":""} déjà existant${matches.length>1?"s":""}</b> :<br>`+
    matches.map(l=>`<span style="display:inline-flex;align-items:center;gap:6px;background:#fff;border:1px solid #ffe58f;border-radius:8px;padding:3px 10px;margin:3px 2px;font-size:11px">
      ${TEMP[l.temperature]?.e||""} <b>${fmtN(l)}</b> · ${l.salesperson} · ${l.store||""} · ${fmtE(l.amount)}
      <span style="color:${l.status==="won"?"#16a34a":l.status==="lost"?"#9ca3af":"#4f46e5"};font-weight:600">${l.status==="won"?"✅ Gagné":l.status==="lost"?"❌ Perdu":"🔄 En cours"}</span>
    </span>`).join("");
};
window.switchFcTab=function(store){
  // Masquer tous les tableaux
  document.querySelectorAll('[id^="fctab_"]').forEach(el=>el.style.display="none");
  // Réinitialiser tous les boutons
  document.querySelectorAll('[id^="fc_tab_"]').forEach(b=>{b.style.background="#fff";b.style.color="#374151";b.style.border="1px solid #d1d5db";});

window.saveLead=()=>{
  const name=document.getElementById("m_name")?.value?.trim();
  const prenom=document.getElementById("m_prenom")?.value?.trim()||"";
  const amt=parseFloat(document.getElementById("m_amt")?.value||0);
  const comment=document.getElementById("m_comment")?.value?.trim()||"";
  const sp=document.getElementById("m_sp")?.value||"";
  const store=document.getElementById("m_store")?.value||"";
  if(!name||!amt||!store||!sp){
    const blink=el=>{
      if(!el)return;
      el.style.outline="2.5px solid #dc2626";el.style.borderRadius="7px";
      let n=0;const t=setInterval(()=>{el.style.outline=n%2===0?"2.5px solid #dc2626":"2.5px solid transparent";n++;if(n>=6){clearInterval(t);el.style.outline="2.5px solid #dc2626";}},180);
    };
    if(!name) blink(document.getElementById("m_name"));
    if(!amt)  blink(document.getElementById("m_amt"));
    if(!sp)   blink(document.getElementById("m_sp"));
    if(!store) blink(document.getElementById("m_store"));
    return;
  }
  const newId=gid();

  if(_signedDirect){
    // Mode signé directement
    const signDate=document.getElementById("m_signdate")?.value||new Date().toISOString().slice(0,10);
    const remark=document.getElementById("m_signremark")?.value?.trim()||"";
    const fullComment=(comment?(comment+(remark?" — "+remark:"")):remark)||"Vente directe";
    leads=[{id:newId,clientName:name,prenom,amount:amt,temperature:"hot",salesperson:sp,store,relanceur:sp,expectedCloseDate:signDate.slice(0,7),nextFollowupDate:"",createdAt:new Date().toISOString(),status:"won",signedDirect:true,lostReason:""},...leads];
    fups=[{id:gid(),leadId:newId,type:"store",comment:"✅ Vente directe — "+fullComment,temperature:"hot",expectedCloseDate:signDate.slice(0,7),nextFollowupDate:"",outcome:"won",lostReason:"",author:user,date:new Date().toISOString()},...fups];
    _signedDirect=false;
  } else {
    // Mode normal
    const relanceur=document.getElementById("m_relanceur")?.value||sp;
    const ecd=document.getElementById("m_ecd")?.value||"";
    const rel=document.getElementById("m_rel")?.value||"";
    const ptype=document.getElementById("m_ptype")?.value||"";
    leads=[{id:newId,clientName:name,prenom,amount:amt,temperature:_newTemp,salesperson:sp,store,relanceur,ptype,expectedCloseDate:ecd,nextFollowupDate:rel,createdAt:new Date().toISOString(),status:"active",commentInit:comment},...leads];
    if(comment){
      fups=[{id:gid(),leadId:newId,type:"call",comment,temperature:_newTemp,expectedCloseDate:ecd,nextFollowupDate:rel,outcome:"pending",lostReason:"",author:user,date:new Date().toISOString()},...fups];
    }
  }
  save();closeModal();
};

window.saveFup=()=>{
  const comment=document.getElementById("f_comment")?.value||"";
  const ecd=document.getElementById("f_ecd")?.value||"";
  const rel=document.getElementById("f_rel")?.value||"";

  // Validation — champs obligatoires
  let errors=[];
  if(!_fTemp) errors.push("f_temp_box");
  if(_outcome==="pending"){
    if(!rel)  errors.push("f_rel");
    if(!ecd)  errors.push("f_ecd");
  }
  if(_outcome==="lost"&&!_lossReason) errors.push("loss_div");

  if(errors.length){
    errors.forEach(id=>{
      const el=document.getElementById(id);
      if(!el)return;
      el.style.transition="";
      el.style.outline="2.5px solid #dc2626";
      el.style.borderRadius="8px";
      // Clignotement rouge
      let count=0;
      const blink=setInterval(()=>{
        el.style.outline=count%2===0?"2.5px solid #dc2626":"2.5px solid transparent";
        count++;
        if(count>=6){clearInterval(blink);el.style.outline="2.5px solid #dc2626";}
      },180);
    });
    // Message d'erreur
    const msg=document.getElementById("fup_error");
    if(msg){
      msg.style.display="block";
      msg.textContent="⚠ Champs obligatoires manquants : "+(
        [!_fTemp?"Température":null, _outcome==="pending"&&!rel?"Date de relance":null, _outcome==="pending"&&!ecd?"Mois de signature":null, _outcome==="lost"&&!_lossReason?"Raison de la perte":null].filter(Boolean).join(", ")
      );
    }
    return;
  }

  const fu={id:gid(),leadId:modalData.leadId,type:_ct,comment,temperature:_fTemp,expectedCloseDate:ecd,nextFollowupDate:rel,outcome:_outcome,lostReason:_lossReason,author:user,date:new Date().toISOString()};
  fups=[fu,...fups];
  const upd={nextFollowupDate:rel,temperature:_fTemp,expectedCloseDate:ecd};
  if(_outcome==="won") upd.status="won";
  if(_outcome==="lost"){upd.status="lost";upd.lostReason=_lossReason;}
  leads=leads.map(l=>l.id===modalData.leadId?{...l,...upd}:l);
  save();closeModal();
};

window.printRelances=function(mode){
  const now=new Date();
  const dayOfWeek=now.getDay()===0?7:now.getDay();
  const monday=new Date(now);monday.setDate(now.getDate()-(dayOfWeek-1));monday.setHours(0,0,0,0);
  const sunday=new Date(monday);sunday.setDate(monday.getDate()+6);sunday.setHours(23,59,59,999);
  const fmtWk=d=>d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const fmtD2=iso=>iso?new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"}):"\u2014";

  let fromDate=null,toDate=null,titre="";
  if(mode==="week"){
    fromDate=monday;toDate=sunday;
    titre="Semaine du "+fmtWk(monday)+" au "+fmtWk(sunday);
  } else if(mode==="retard"){
    toDate=new Date();toDate.setHours(23,59,59,999);
    titre="Relances en retard \u2014 jusqu'au "+fmtWk(toDate);
  } else {
    const fromVal=document.getElementById("print_from")?.value;
    const toVal=document.getElementById("print_to")?.value;
    if(fromVal){fromDate=new Date(fromVal);fromDate.setHours(0,0,0,0);}
    if(toVal){toDate=new Date(toVal);toDate.setHours(23,59,59,999);}
    if(fromDate&&toDate) titre="Relances du "+fmtWk(fromDate)+" au "+fmtWk(toDate);
    else if(fromDate) titre="Relances \u00e0 partir du "+fmtWk(fromDate);
    else if(toDate) titre="Relances jusqu'au "+fmtWk(toDate);
    else titre="Toutes les relances \u00e0 venir";
  }

  const responsables=[...new Set([...SPS,...SECS])];
  let sections="";
  let totalRelances=0;

  responsables.forEach(resp=>{
    const myLeads=aL().filter(l=>(l.relanceur||l.salesperson)===resp);
    const sortMode=window.relPrintSort||"date";
    const tempFilter=window.relPrintTemp||"all";
    const TEMP_ORDER={hot:0,warm:1,cold:2};
    const filtered=myLeads.filter(l=>{
      if(!l.nextFollowupDate)return false;
      const d=new Date(l.nextFollowupDate);
      if(fromDate&&d<fromDate)return false;
      if(toDate&&d>toDate)return false;
      if(tempFilter!=="all"&&l.temperature!==tempFilter)return false;
      return true;
    }).sort((a,b)=>{
      if(sortMode==="amount_desc")return b.amount-a.amount;
      if(sortMode==="amount_asc")return a.amount-b.amount;
      if(sortMode==="temperature")return (TEMP_ORDER[a.temperature]||0)-(TEMP_ORDER[b.temperature]||0);
      return new Date(a.nextFollowupDate)-new Date(b.nextFollowupDate);
    });
    if(!filtered.length)return;
    totalRelances+=filtered.length;

    let rows="";
    filtered.forEach((l,i)=>{
      const ov=isOD(l.nextFollowupDate);
      const lastFup=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
      const ct=lastFup?CTYPES.find(c=>c[0]===lastFup.type):null;
      const bg=ov?"#fff5f5":i%2===0?"#fff":"#fafafa";
      rows+=`<tr style="background:${bg}">
        <td style="padding:7px 8px;border:1px solid #ddd;font-weight:bold;white-space:nowrap;color:${ov?"#dc2626":"#111"}">${ov?"\u26a0 ":""}${fmtD2(l.nextFollowupDate)}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;font-weight:bold">${fmtN(l)}</td>
        <td style="padding:7px 8px;border:1px solid #ddd">${l.salesperson}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;font-size:10px">${l.store||"\u2014"}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;text-align:right;font-weight:bold">${fmtE(l.amount)}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;text-align:center">${TEMP[l.temperature].e} ${TEMP[l.temperature].l}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;text-align:center;color:#4f46e5;font-size:10px">${l.expectedCloseDate?fmtM(l.expectedCloseDate):"\u2014"}</td>
        <td style="padding:7px 8px;border:1px solid #ddd;font-size:10px">${lastFup?(ct?ct[1]+" "+ct[2]+(lastFup.comment?" : "+lastFup.comment:""):"(pas de type)"):"Aucune relance enregistr\u00e9e"}</td>
      </tr>`;
    });

    sections+=`<div style="margin-bottom:28px;page-break-inside:avoid">
      <h2 style="font-size:14px;font-weight:bold;background:#f3f4f6;padding:8px 12px;margin-bottom:0;border-radius:6px 6px 0 0;border:1px solid #ddd">${resp} \u2014 ${filtered.length} relance${filtered.length>1?"s":""}</h2>
      <table style="width:100%;border-collapse:collapse;font-size:11px;border:1px solid #ddd;border-top:none">
        <thead><tr style="background:#fafafa">
          <th style="padding:6px 8px;text-align:left;border:1px solid #ddd">Date relance</th>
          <th style="padding:6px 8px;text-align:left;border:1px solid #ddd">Client</th>
          <th style="padding:6px 8px;text-align:left;border:1px solid #ddd">Vendeur</th>
          <th style="padding:6px 8px;text-align:left;border:1px solid #ddd">Magasin</th>
          <th style="padding:6px 8px;text-align:right;border:1px solid #ddd">Devis</th>
          <th style="padding:6px 8px;text-align:center;border:1px solid #ddd">Temp.</th>
          <th style="padding:6px 8px;text-align:center;border:1px solid #ddd">Signature</th>
          <th style="padding:6px 8px;text-align:left;border:1px solid #ddd">Dernier contact & commentaire</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>`;
  });

  const body=totalRelances===0
    ?`<p style="text-align:center;color:#888;padding:40px">Aucune relance trouv\u00e9e pour cette p\u00e9riode.</p>`
    :sections;

  // Créer un iframe caché pour l'impression (évite le bloqueur de popups)
  const existingIframe=document.getElementById("print_iframe");
  if(existingIframe) existingIframe.remove();
  const iframe=document.createElement("iframe");
  iframe.id="print_iframe";
  iframe.style.cssText="position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;border:none";
  document.body.appendChild(iframe);
  iframe.contentDocument.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titre}</title>
    <style>body{font-family:Arial,sans-serif;padding:20px;font-size:12px;color:#111}h1{margin:0 0 4px}@media print{@page{size:A4 landscape;margin:12mm}}</style>
  </head><body>
    <h1>${titre}</h1>
    <p style="font-size:12px;color:#666;margin-bottom:16px">Imprimé le ${fmtWk(now)} · Suivi Commercial · ${totalRelances} relance${totalRelances>1?"s":""}</p>
    <hr style="margin-bottom:20px">
    ${body}
  </body></html>`);
  iframe.contentDocument.close();
  setTimeout(()=>{iframe.contentWindow.focus();iframe.contentWindow.print();},300);
};

window.exportData=function(){
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,"0")}${String(now.getDate()).padStart(2,"0")}_${String(now.getHours()).padStart(2,"0")}${String(now.getMinutes()).padStart(2,"0")}`;
  const data={leads,fups,objectifs,exportedAt:now.toISOString(),version:"1.0"};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`suivi_commercial_${stamp}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
};

window.importData=function(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data.leads||!Array.isArray(data.leads)){
        alert("❌ Fichier invalide — ce n'est pas une sauvegarde Suivi Commercial.");
        return;
      }
      const nb=data.leads.length;
      const date=data.exportedAt?new Date(data.exportedAt).toLocaleString("fr-FR"):"inconnue";
      if(!confirm(`📂 Restaurer la sauvegarde du ${date} ?\n\n${nb} dossiers trouvés.\n\n⚠️ Cela remplacera TOUTES les données actuelles.`))return;
      leads=data.leads||[];
      fups=data.fups||[];
      objectifs=data.objectifs||{};
      save();
      render();
      alert(`✅ Restauration réussie ! ${nb} dossiers chargés.`);
    } catch(err){
      alert("❌ Erreur lors de la lecture du fichier : "+err.message);
    }
    input.value=""; // reset pour pouvoir reimporter le même fichier
  };
  reader.readAsText(file);
};

          <div style="font-size:11px;color:#9ca3af;margin-top:2px">${myLeads.length} dossier${myLeads.length>1?"s":""} actifs assignés${od2.length?` · <span style="color:#dc2626;font-weight:600">⚠ ${od2.length} en retard</span>`:""}</div>
        </div>
        ${od2.length?`<span style="background:#fef2f2;color:#dc2626;border:1px solid #fca5a5;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600">⚠ ${od2.length} en retard</span>`:`<span style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:600">✓ À jour</span>`}
      </div>`;

    if(!myLeads.length){html+=`<div class="empty">Aucun dossier assigné</div>`;html+=`</div>`;return;}

    const renderGroup=(list,title,color)=>{
      if(!list.length)return"";
      let g=`<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:600;color:${color};margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${title} (${list.length})</div>`;
      list.forEach(l=>{
        const ov=isOD(l.nextFollowupDate);
        g+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;margin-bottom:5px;background:${ov?"#fff5f5":"#f9fafb"};border:1px solid ${ov?"#fca5a5":"#e8eaed"}">
          <span style="font-size:14px">${TEMP[l.temperature].e}</span>
          <div style="flex:1;cursor:pointer" onclick="go('lead','${l.id}')">
            <div style="font-weight:600;font-size:13px">${fmtN(l)}</div>
            <div style="font-size:11px;color:#9ca3af">${l.salesperson} · ${l.store||""}${l.expectedCloseDate?" · Signature : "+fmtM(l.expectedCloseDate):""}${l.salesperson!==resp?`<span style="color:#7c3aed;font-weight:600;margin-left:4px">· délégué par ${l.salesperson}</span>`:""}</div>
          </div>
          <div style="text-align:right;min-width:80px">
            <div style="font-weight:700;color:#4f46e5;font-size:13px">${fmtE(l.amount)}</div>
            <div style="font-size:11px;color:${ov?"#dc2626":"#6b7280"};font-weight:${ov?600:400}">${ov?"⚠ En retard":l.nextFollowupDate?fmtD(l.nextFollowupDate):"—"}</div>
          </div>
          <div style="min-width:130px">
            <select style="font-size:11px;padding:4px 6px;border-radius:6px;border:1px solid #d1d5db;cursor:pointer;background:#fff;width:100%" onchange="changeRelanceur('${l.id}',this.value)">
              ${[...SPS,...secsForStore(l.store)].filter((v,i,a)=>a.indexOf(v)===i).map(r=>`<option value="${r}"${(l.relanceur||l.salesperson)===r?" selected":""}>${r}</option>`).join("")}
            </select>
          </div>
        </div>`;
      });
      g+=`</div>`;return g;
    };

    html+=renderGroup(od2,"🔴 En retard","#dc2626");
    html+=renderGroup(today2,"🟡 Cette semaine","#d97706");
    html+=renderGroup(later,"🟢 Plus tard","#16a34a");
    html+=renderGroup(noDt,"⬜ Sans date de relance","#9ca3af");
    html+=`</div>`;
  });
  return html;
}

// ─── RAPPORT HEBDOMADAIRE ─────────────────────────────────────
function rapportHTML(){
  const now=new Date();
  const day=now.getDay()===0?7:now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(day-1));mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  const fmtWk=d=>d.toLocaleDateString("fr-FR",{day:"2-digit",month:"2-digit",year:"numeric"});
  const inWeek=l=>new Date(l.createdAt)>=mon&&new Date(l.createdAt)<=sun;
  const inWeekF=f=>new Date(f.date)>=mon&&new Date(f.date)<=sun;

  const newLeads=leads.filter(inWeek);
  const wonWeek=leads.filter(l=>l.status==="won"&&inWeek(l));
  const fupWeek=fups.filter(inWeekF);
  const odL=leads.filter(l=>l.status==="active"&&isOD(l.nextFollowupDate));
  const dormants=leads.filter(l=>{
    if(l.status!=="active")return false;
    const lastF=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const lastActJ=lastF?Math.floor((new Date()-new Date(lastF.date))/86400000):Math.floor((new Date()-new Date(l.createdAt))/86400000);
    return lastActJ>15;
  });

  // N-1 : même semaine l'an dernier
  const mon1=new Date(mon);mon1.setFullYear(mon1.getFullYear()-1);
  const sun1=new Date(sun);sun1.setFullYear(sun1.getFullYear()-1);
  const inLastYear=l=>new Date(l.createdAt)>=mon1&&new Date(l.createdAt)<=sun1;
  const newLeadsN1=leads.filter(inLastYear);
  const wonN1=leads.filter(l=>l.status==="won"&&inLastYear(l));

  let html=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div><div style="font-weight:700;font-size:16px">📋 Rapport hebdomadaire</div><div style="font-size:12px;color:#9ca3af">Semaine du ${fmtWk(mon)} au ${fmtWk(sun)}</div></div>
    <button onclick="printRapport()" style="background:#4f46e5;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer">🖨️ Imprimer le rapport</button>
  </div>`;

  // KPIs semaine
  const caNew=newLeads.reduce((s,l)=>s+l.amount,0);
  const caWon=wonWeek.reduce((s,l)=>s+l.amount,0);
  const caNewN1=newLeadsN1.reduce((s,l)=>s+l.amount,0);
  const caWonN1=wonN1.reduce((s,l)=>s+l.amount,0);
  const pct=(a,b)=>b===0?"N/A":(a>=b?"+":"")+Math.round((a-b)/b*100)+"%";
  const pctColor=(a,b)=>b===0?"#6b7280":a>=b?"#16a34a":"#dc2626";

  html+=`<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px">`;
  [{l:"Nouveaux devis",v:newLeads.length,s:fmtE(caNew),p:pct(newLeads.length,newLeadsN1.length),pc:pctColor(newLeads.length,newLeadsN1.length),c:"#4f46e5"},
   {l:"CA signé",v:fmtE(caWon),s:wonWeek.length+" dossier(s)",p:pct(caWon,caWonN1),pc:pctColor(caWon,caWonN1),c:"#16a34a"},
   {l:"Relances effectuées",v:fupWeek.length,s:"cette semaine",p:"",pc:"",c:"#0891b2"},
   {l:"⚠ Retards",v:odL.length,s:"relances en retard",p:"",pc:odL.length>0?"#dc2626":"#16a34a",c:odL.length>0?"#dc2626":"#16a34a"},
  ].forEach(c=>{
    html+=`<div class="kpi" style="border-left:4px solid ${c.c}">
      <div class="lbl">${c.l}</div>
      <div class="val" style="color:${c.c}">${c.v}</div>
      <div style="display:flex;justify-content:space-between;margin-top:3px">
        <span style="font-size:10px;color:#9ca3af">${c.s}</span>
        ${c.p?`<span style="font-size:11px;font-weight:700;color:${c.pc}">${c.p} vs N-1</span>`:""}
      </div>
    </div>`;
  });
  html+=`</div>`;

  // Comparaison N vs N-1
  html+=`<div class="card" style="margin-bottom:14px"><div class="card-title">📊 Cette semaine vs même semaine N-1</div><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;margin-top:12px"><thead><tr style="background:#fafafa"><th style="padding:8px 10px;text-align:left;font-size:11px;color:#9ca3af">Indicateur</th><th style="padding:8px 10px;text-align:right;font-size:11px;color:#4f46e5">Cette semaine</th><th style="padding:8px 10px;text-align:right;font-size:11px;color:#9ca3af">N-1</th><th style="padding:8px 10px;text-align:right;font-size:11px;color:#6b7280">Évolution</th></tr></thead><tbody>
    ${[["Nouveaux devis (nb)",newLeads.length,newLeadsN1.length],["CA nouveaux devis",fmtE(caNew),fmtE(caNewN1)],["Dossiers signés",wonWeek.length,wonN1.length],["CA signé",fmtE(caWon),fmtE(caWonN1)]].map(([l,a,b])=>{
      const numA=typeof a==="number"?a:parseFloat((a||"0").replace(/[^0-9.-]/g,""));
      const numB=typeof b==="number"?b:parseFloat((b||"0").replace(/[^0-9.-]/g,""));
      const ev=numB===0?"N/A":(numA>=numB?"+":"")+Math.round((numA-numB)/numB*100)+"%";
      const c=numB===0?"#6b7280":numA>=numB?"#16a34a":"#dc2626";
      return `<tr style="border-bottom:1px solid #f3f4f6"><td style="padding:10px 10px;font-weight:500">${l}</td><td style="padding:10px 10px;text-align:right;font-weight:700;color:#4f46e5">${typeof a==="string"?a:a}</td><td style="padding:10px 10px;text-align:right;color:#9ca3af">${typeof b==="string"?b:b}</td><td style="padding:10px 10px;text-align:right;font-weight:700;color:${c}">${ev}</td></tr>`;
    }).join("")}
  </tbody></table></div></div>`;

  // Nouveaux dossiers de la semaine
  html+=`<div class="card" style="margin-bottom:14px"><div class="card-title">🆕 Nouveaux dossiers cette semaine (${newLeads.length})</div>`;
  if(!newLeads.length){html+=`<div class="empty">Aucun nouveau dossier</div>`;}
  else{html+=`<table style="width:100%;border-collapse:collapse;margin-top:10px"><thead><tr><th style="padding:7px 10px;text-align:left;font-size:11px;color:#9ca3af">Client</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Vendeur</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Magasin</th><th style="padding:7px 10px;text-align:right;font-size:11px;color:#9ca3af">Montant</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Temp.</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Type</th></tr></thead><tbody>`;
  newLeads.sort((a,b)=>b.amount-a.amount).forEach(l=>{html+=`<tr style="border-bottom:1px solid #f9fafb;cursor:pointer" onclick="go('lead','${l.id}')"><td style="padding:9px 10px;font-weight:600">${fmtN(l)}</td><td style="padding:9px 10px;color:#6b7280">${l.salesperson}</td><td style="padding:9px 10px"><span class="store-tag">${l.store||"—"}</span></td><td style="padding:9px 10px;text-align:right;font-weight:700;color:#4f46e5">${fmtE(l.amount)}</td><td style="padding:9px 10px"><span class="badge ${l.temperature}">${TEMP[l.temperature].e}</span></td><td style="padding:9px 10px;font-size:11px;color:#9ca3af">${l.ptype||"—"}</td></tr>`;});
  html+=`</tbody></table>`;}
  html+=`</div>`;

  // Signés cette semaine
  html+=`<div class="card" style="margin-bottom:14px"><div class="card-title">✅ Signés cette semaine (${wonWeek.length}) — ${fmtE(caWon)}</div>`;
  if(!wonWeek.length){html+=`<div class="empty">Aucun dossier signé</div>`;}
  else{html+=`<table style="width:100%;border-collapse:collapse;margin-top:10px"><thead><tr><th style="padding:7px 10px;text-align:left;font-size:11px;color:#9ca3af">Client</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Vendeur</th><th style="padding:7px 10px;font-size:11px;color:#9ca3af">Magasin</th><th style="padding:7px 10px;text-align:right;font-size:11px;color:#9ca3af">CA</th></tr></thead><tbody>`;
  wonWeek.sort((a,b)=>b.amount-a.amount).forEach(l=>{html+=`<tr style="border-bottom:1px solid #f9fafb"><td style="padding:9px 10px;font-weight:600">${fmtN(l)}${l.signedDirect?`<span style="font-size:10px;color:#16a34a;margin-left:6px">⚡ direct</span>`:""}</td><td style="padding:9px 10px;color:#6b7280">${l.salesperson}</td><td style="padding:9px 10px"><span class="store-tag">${l.store||"—"}</span></td><td style="padding:9px 10px;text-align:right;font-weight:700;color:#16a34a">${fmtE(l.amount)}</td></tr>`;});
  html+=`</tbody></table>`;}
  html+=`</div>`;

  // Dossiers dormants
  html+=`<div class="card"><div class="card-title" style="color:${dormants.length>0?"#dc2626":"#374151"}">⏳ Dossiers dormants +15 jours sans activité (${dormants.length})</div>`;
  if(!dormants.length){html+=`<div class="empty" style="color:#16a34a">✓ Tous les dossiers sont actifs !</div>`;}
  else{html+=`<div style="font-size:12px;color:#9ca3af;margin-bottom:10px">Ces dossiers n'ont aucune relance depuis plus de 15 jours — à réactiver ou à clore.</div>`;
  dormants.sort((a,b)=>b.amount-a.amount).forEach(l=>{
    const lastF=fups.filter(f=>f.leadId===l.id).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
    const j=lastF?Math.floor((new Date()-new Date(lastF.date))/86400000):Math.floor((new Date()-new Date(l.createdAt))/86400000);
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:9px 12px;margin-bottom:5px;background:#fff5f5;border:1px solid #fca5a5;border-radius:8px;cursor:pointer" onclick="go('lead','${l.id}')">
      <div style="display:flex;align-items:center;gap:8px"><span>${TEMP[l.temperature].e}</span><div><div style="font-weight:600">${fmtN(l)}</div><div style="font-size:11px;color:#9ca3af">${l.salesperson} · ${l.store||""}</div></div></div>
      <div style="text-align:right"><div style="font-weight:700;color:#4f46e5">${fmtE(l.amount)}</div><div style="font-size:11px;color:#dc2626;font-weight:600">🔴 ${j} jours sans activité</div></div>
    </div>`;
  });}
  html+=`</div>`;
  return html;
}

// ─── OBJECTIFS ────────────────────────────────────────────────
function objectifsHTML(){
  const now=new Date();
  const curMonth=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;

  let html=`<div style="font-weight:700;font-size:16px;margin-bottom:4px">🎯 Objectifs mensuels</div>
  <div style="font-size:12px;color:#9ca3af;margin-bottom:16px">Objectifs CA par vendeur et par magasin. La barre bleue = pipeline en attente, la couleur = déjà signé.</div>`;

  // Sélecteur de mois + onglets
  html+=`<div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap">
    <label style="font-size:12px;color:#6b7280;font-weight:500">📅 Mois :</label>
    <input type="month" id="obj_month" value="${curMonth}" onchange="render()" style="border:1px solid #d1d5db;border-radius:7px;padding:7px 11px;font-size:13px;outline:none">
    <span style="color:#d1d5db">|</span>
    ${["vendeurs","magasins"].map(t=>`<button onclick="objTab='${t}';render()" style="padding:6px 16px;border-radius:20px;border:${(window.objTab||'vendeurs')===t?"none":"1px solid #d1d5db"};background:${(window.objTab||'vendeurs')===t?"#4f46e5":"#fff"};color:${(window.objTab||'vendeurs')===t?"#fff":"#374151"};font-size:12px;font-weight:${(window.objTab||'vendeurs')===t?600:400};cursor:pointer">${t==="vendeurs"?"👤 Par vendeur":"🏪 Par magasin"}</button>`).join("")}
  </div>`;

  const month=document.getElementById("obj_month")?.value||curMonth;
  const tab=window.objTab||"vendeurs";

  // Fonction helper barre de progression
  const makeBar=(key,label,won,pipe,defaultObj,icon)=>{
    const obj=objectifs[key]!==undefined?objectifs[key]:defaultObj;
    const pctWon=obj?Math.min(100,Math.round(won/obj*100)):0;
    const pctPipe=obj?Math.min(100-pctWon,Math.round(pipe/obj*100)):0;
    const pctColor=pctWon>=80?"#16a34a":pctWon>=50?"#d97706":"#dc2626";
    const manque=Math.max(0,obj-won);
    return `<div class="card" style="padding:16px 18px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px">
        <div style="font-weight:700;font-size:14px">${icon} ${label}</div>
        <div style="display:flex;align-items:center;gap:8px">
          <label style="font-size:11px;color:#6b7280">Objectif :</label>
          <input type="number" value="${obj}" placeholder="${defaultObj}" min="0"
            style="width:130px;border:1px solid #d1d5db;border-radius:7px;padding:6px 10px;font-size:13px;outline:none"
            onchange="objectifs['${key}']=parseFloat(this.value)||0;save();render()">
          <span style="font-size:11px;color:#9ca3af">€</span>
        </div>
      </div>
      <div style="display:flex;height:16px;background:#f3f4f6;border-radius:8px;overflow:hidden;margin-bottom:10px">
        <div style="flex:${pctWon};background:${pctColor};min-width:${pctWon?4:0}px" title="CA signé : ${fmtE(won)}"></div>
        <div style="flex:${pctPipe};background:#c7d2fe;min-width:${pctPipe?4:0}px" title="Pipeline : ${fmtE(pipe)}"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:12px;flex-wrap:wrap;gap:6px">
        <div style="display:flex;gap:16px">
          <span>✅ Signé : <b style="color:${pctColor}">${fmtE(won)}</b></span>
          <span>💼 Pipeline : <b style="color:#4f46e5">${fmtE(pipe)}</b></span>
          <span style="color:#9ca3af">Potentiel : <b>${fmtE(won+pipe)}</b></span>
        </div>
        <span style="font-weight:700;font-size:13px;color:${pctColor}">${pctWon}%${pctWon>=100?" 🎉":""}</span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:8px">
        <div style="flex:1;height:4px;background:#f3f4f6;border-radius:2px"><div style="height:4px;border-radius:2px;background:${pctColor};width:${pctWon}%"></div></div>
        <span style="font-size:11px;color:${pctColor};font-weight:600;white-space:nowrap">${manque>0?`Il manque ${fmtE(manque)}`:"Objectif atteint !"}</span>
      </div>
    </div>`;
  };

  html+=`<div style="display:flex;flex-direction:column;gap:12px">`;

  if(tab==="vendeurs"){
    // Total équipe d'abord
    const totWon=leads.filter(l=>l.status==="won"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
    const totPipe=leads.filter(l=>l.status==="active"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
    const totObj=SPS.reduce((s,sp)=>{const k=`${sp}_${month}`;return s+(objectifs[k]!==undefined?objectifs[k]:100000);},0);
    html+=`<div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:14px 18px;margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="font-weight:700;color:#4f46e5">📊 Total équipe — ${fmtM(month)}</div>
        <div style="font-size:12px;color:#4f46e5">Objectif cumulé : <b>${fmtE(totObj)}</b></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;flex-wrap:wrap">
        <span>✅ Signé : <b style="color:#16a34a">${fmtE(totWon)}</b></span>
        <span>💼 Pipeline : <b style="color:#4f46e5">${fmtE(totPipe)}</b></span>
        <span>📈 Progression : <b>${totObj?Math.round(totWon/totObj*100)+"%":"—"}</b></span>
      </div>
    </div>`;
    SPS.forEach(sp=>{
      const key=`${sp}_${month}`;
      const won=leads.filter(l=>l.salesperson===sp&&l.status==="won"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
      const pipe=leads.filter(l=>l.salesperson===sp&&l.status==="active"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
      html+=makeBar(key,sp,won,pipe,100000,"👤");
    });
  } else {
    // Total tous magasins
    const totWon=leads.filter(l=>l.status==="won"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
    const totPipe=leads.filter(l=>l.status==="active"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
    const totObj=STORES.reduce((s,st)=>{const k=`store_${st}_${month}`;return s+(objectifs[k]!==undefined?objectifs[k]:200000);},0);
    html+=`<div style="background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:14px 18px;margin-bottom:4px">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
        <div style="font-weight:700;color:#4f46e5">📊 Total tous magasins — ${fmtM(month)}</div>
        <div style="font-size:12px;color:#4f46e5">Objectif cumulé : <b>${fmtE(totObj)}</b></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px;flex-wrap:wrap">
        <span>✅ Signé : <b style="color:#16a34a">${fmtE(totWon)}</b></span>
        <span>💼 Pipeline : <b style="color:#4f46e5">${fmtE(totPipe)}</b></span>
        <span>📈 Progression : <b>${totObj?Math.round(totWon/totObj*100)+"%":"—"}</b></span>
      </div>
    </div>`;
    STORES.forEach(st=>{
      const key=`store_${st}_${month}`;
      const won=leads.filter(l=>l.store===st&&l.status==="won"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
      const pipe=leads.filter(l=>l.store===st&&l.status==="active"&&l.expectedCloseDate===month).reduce((s,l)=>s+l.amount,0);
      html+=makeBar(key,st,won,pipe,200000,"🏪");
    });
  }

  html+=`</div>
  <div style="margin-top:14px;padding:10px 14px;background:#fffbe6;border:1px solid #ffe58f;border-radius:8px;font-size:11px;color:#ad6800">
    💡 <b>Légende :</b> barre colorée = CA signé · barre bleue claire = pipeline en attente de signature · les deux additionnés = potentiel total du mois.
  </div>`;
  return html;
}

// ─── RENDER ───────────────────────────────────────────────────
function render(){
  const sel=leads.find(l=>l.id===lid);
  const odL=aL().filter(l=>isOD(l.nextFollowupDate));
  const curView=sel?"lead":view;

  let html=`
  <div class="hdr">
    <span class="hdr-title">Suivi Commercial</span>
    <div class="hdr-mid">
      ${odL.length?`<span class="alert-red" onclick="filt.status='active';go('pipeline')">⚠ ${odL.length} relance${odL.length>1?"s":""} en retard</span>`:""}
    </div>
    <div class="user-box">
      <span style="font-size:11px;color:#4f46e5;font-weight:600">👤 Connecté :</span>
      <select style="background:transparent;border:none;font-size:13px;font-weight:700;color:#4f46e5;cursor:pointer;outline:none;padding:2px 4px" onchange="user=this.value;render()">
        ${allU().map(u=>`<option${u===user?" selected":""}>${u}</option>`).join("")}
      </select>
    </div>
  </div>
  <div class="nav">
    ${[["dashboard","📊 Tableau de bord"],["pipeline","📋 Tuyau"],["relances","📞 Relances"],["stats","📈 Statistiques"],["rapport","📋 Rapport"],["objectifs","🎯 Objectifs"]].map(([id,lb])=>`<button class="nb${view===id&&!sel?" a":""}" onclick="go('${id}')">${lb}</button>`).join("")}
    ${sel?`<button class="nb a">👤 ${fmtN(sel)}</button>`:""}
    <button onclick="exportData()" title="Sauvegarder toutes les données" style="background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">💾 Exporter</button>
    <label title="Restaurer depuis une sauvegarde" style="background:#fefce8;color:#d97706;border:1px solid #fde68a;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">
      📂 Importer<input type="file" accept=".json" onchange="importData(this)" style="display:none">
    </label>
    <span id="sync_status" onclick="openModal('cloud')" style="cursor:pointer"></span>
    <button onclick="openModal('cloud')" title="Configurer le partage réseau" style="background:#eef2ff;color:#4f46e5;border:1px solid #c7d2fe;border-radius:7px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer">☁️ Cloud</button>
    <button onclick="openModal('lead')" style="background:#4f46e5;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer;margin-left:auto">+ Nouveau dossier</button>
    <button onclick="openModal('vente')" style="background:#16a34a;color:#fff;border:none;border-radius:7px;padding:6px 14px;font-size:12px;font-weight:700;cursor:pointer">💰 Saisir une vente</button>
  </div>
  <div class="wrap">
    ${curView==="dashboard"?dashHTML():""}
    ${curView==="pipeline"?pipelineHTML():""}
    ${curView==="relances"?relancesHTML():""}
    ${curView==="lead"?leadHTML():""}
    ${curView==="rapport"?rapportHTML():""}
    ${curView==="objectifs"?objectifsHTML():""}
    ${curView==="stats"?statsHTML():""}
  </div>
  ${modal?`<div class="ovl" onclick="closeModal()">${modal==="lead"?modalLeadHTML():modal==="fup"?modalFupHTML():modal==="hist"?modalHistHTML():modal==="vente"?modalVenteHTML():modal==="cloud"?modalCloudHTML():""}</div>`:""}
  `;
  document.getElementById("app").innerHTML=html;

  if(modal==="lead"){_signedDirect=false;setTimeout(()=>setTemp(_newTemp),0);}
  if(modal==="fup"){
    const l=leads.find(x=>x.id===modalData.leadId)||{};
    _fTemp=l.temperature||"warm";_ct="call";_outcome="pending";_lossReason="";
    setTimeout(()=>{setFTemp(_fTemp);setCT("call");},0);
  }
}

load(); render(); initCloud();
</script>
</body>
</html>
